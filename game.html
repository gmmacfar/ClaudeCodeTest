<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOP-DOWN SHOOTER</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: monospace;
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    cursor: crosshair;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const W = 800;
const H = 600;
canvas.width = W;
canvas.height = H;

// ── State ──────────────────────────────────────────────────────────────────
let state = 'menu'; // menu | playing | level-clear | game-over
let score = 0;
let currentLevel = 1;
let frameCount = 0;
let shakeTimer = 0;
let shakeAmt = 0;

// ── Input ──────────────────────────────────────────────────────────────────
const keys = {};
const mouse = { x: W / 2, y: H / 2, down: false };

document.addEventListener('keydown', e => { keys[e.key] = true; e.preventDefault(); });
document.addEventListener('keyup', e => { keys[e.key] = false; });
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  const scaleX = W / r.width;
  const scaleY = H / r.height;
  mouse.x = (e.clientX - r.left) * scaleX;
  mouse.y = (e.clientY - r.top) * scaleY;
});
canvas.addEventListener('mousedown', e => { if (e.button === 0) mouse.down = true; });
canvas.addEventListener('mouseup', e => { if (e.button === 0) mouse.down = false; });
canvas.addEventListener('click', e => {
  if (state === 'menu') startGame();
  else if (state === 'level-clear') nextLevel();
  else if (state === 'game-over') { state = 'menu'; }
});

// ── Player ─────────────────────────────────────────────────────────────────
let player;
function initPlayer() {
  player = {
    x: W / 2, y: H / 2,
    hp: 100, maxHp: 100,
    speed: 3,
    angle: 0,
    frameCount: 0,
    invincibleTimer: 0,
    shootCooldown: 0,
    radius: 12,
    muzzleFlash: 0,
  };
}

// ── Bullets ────────────────────────────────────────────────────────────────
let bullets = [];

function spawnBullet(x, y, angle) {
  const speed = 10;
  bullets.push({
    x, y,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    fromPlayer: true,
    life: 80,
  });
}

// ── Enemies ────────────────────────────────────────────────────────────────
let enemies = [];
let spawnQueue = [];
let spawnTimer = 0;

const ENEMY_DEFS = {
  grunt:   { hp: 2,  speed: 1.2, color: '#cc2222', size: 16, score: 10 },
  rusher:  { hp: 1,  speed: 2.8, color: '#ff8800', size: 14, score: 15 },
  flanker: { hp: 2,  speed: 1.8, color: '#9933cc', size: 14, score: 20 },
  tank:    { hp: 8,  speed: 0.6, color: '#778899', size: 22, score: 50 },
};

const LEVEL_DEFS = [
  null, // index 0 unused
  { enemies: Array(8).fill('grunt') },
  { enemies: [...Array(8).fill('grunt'), ...Array(6).fill('rusher')] },
  { enemies: [...Array(7).fill('grunt'), ...Array(5).fill('rusher'), ...Array(6).fill('flanker')] },
  { enemies: [...Array(7).fill('grunt'), ...Array(6).fill('rusher'), ...Array(6).fill('flanker'), ...Array(5).fill('tank')] },
  { enemies: [...Array(8).fill('grunt'), ...Array(8).fill('rusher'), ...Array(7).fill('flanker'), ...Array(6).fill('tank'), 'tank'] },
];

function edgeSpawnPos() {
  const side = Math.floor(Math.random() * 4);
  let x, y;
  const m = 30;
  if (side === 0) { x = Math.random() * W; y = -m; }
  else if (side === 1) { x = W + m; y = Math.random() * H; }
  else if (side === 2) { x = Math.random() * W; y = H + m; }
  else { x = -m; y = Math.random() * H; }
  return { x, y };
}

function spawnEnemy(type) {
  const def = ENEMY_DEFS[type];
  const pos = edgeSpawnPos();
  // flanker: offset angle 45-90 degrees
  let offsetAngle = 0;
  if (type === 'flanker') {
    offsetAngle = (Math.random() > 0.5 ? 1 : -1) * (Math.PI / 4 + Math.random() * Math.PI / 4);
  }
  enemies.push({
    x: pos.x, y: pos.y,
    hp: def.hp, maxHp: def.hp,
    speed: def.speed * (1 + (currentLevel - 1) * 0.08),
    type,
    color: def.color,
    size: def.size,
    score: def.score,
    frameCount: Math.floor(Math.random() * 100),
    deathFlash: 0,
    offsetAngle,
    vx: 0, vy: 0,
  });
}

function setupLevel(level) {
  enemies = [];
  bullets = [];
  spawnQueue = [...LEVEL_DEFS[level].enemies];
  // shuffle
  for (let i = spawnQueue.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [spawnQueue[i], spawnQueue[j]] = [spawnQueue[j], spawnQueue[i]];
  }
  spawnTimer = 0;
}

// ── Death effects ──────────────────────────────────────────────────────────
let deathRings = [];

function addDeathRing(x, y, color) {
  deathRings.push({ x, y, r: 4, maxR: 30, life: 1.0, color });
}

// ── Game init ──────────────────────────────────────────────────────────────
function startGame() {
  score = 0;
  currentLevel = 1;
  initPlayer();
  setupLevel(currentLevel);
  state = 'playing';
}

function nextLevel() {
  currentLevel++;
  if (currentLevel > 5) {
    state = 'menu';
    return;
  }
  initPlayer();
  setupLevel(currentLevel);
  state = 'playing';
}

// ── Update ─────────────────────────────────────────────────────────────────
function update() {
  if (state !== 'playing') return;

  frameCount++;
  player.frameCount++;

  // Screen shake decay
  if (shakeTimer > 0) { shakeTimer--; shakeAmt = shakeTimer * 0.4; }

  // Player invincibility
  if (player.invincibleTimer > 0) player.invincibleTimer--;

  // Shoot cooldown
  if (player.shootCooldown > 0) player.shootCooldown--;
  if (player.muzzleFlash > 0) player.muzzleFlash--;

  // ── Player movement
  let dx = 0, dy = 0;
  if (keys['ArrowLeft']  || keys['a']) dx -= 1;
  if (keys['ArrowRight'] || keys['d']) dx += 1;
  if (keys['ArrowUp']    || keys['w']) dy -= 1;
  if (keys['ArrowDown']  || keys['s']) dy += 1;
  if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }
  player.x = Math.max(player.radius, Math.min(W - player.radius, player.x + dx * player.speed));
  player.y = Math.max(player.radius, Math.min(H - player.radius, player.y + dy * player.speed));

  // Player angle toward mouse
  player.angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);

  // Shoot
  if (mouse.down && player.shootCooldown === 0) {
    const gunLen = 14;
    const bx = player.x + Math.cos(player.angle) * gunLen;
    const by = player.y + Math.sin(player.angle) * gunLen;
    spawnBullet(bx, by, player.angle);
    player.shootCooldown = 8;
    player.muzzleFlash = 4;
  }

  // ── Spawn enemies from queue
  spawnTimer++;
  const spawnInterval = Math.max(20, 60 - currentLevel * 5);
  if (spawnTimer >= spawnInterval && spawnQueue.length > 0) {
    spawnEnemy(spawnQueue.pop());
    spawnTimer = 0;
  }

  // ── Move enemies
  for (const e of enemies) {
    e.frameCount++;
    const dx = player.x - e.x;
    const dy = player.y - e.y;
    const dist = Math.sqrt(dx * dx + dy * dy) || 1;
    const baseAngle = Math.atan2(dy, dx);
    const angle = baseAngle + e.offsetAngle;
    e.vx = Math.cos(angle) * e.speed;
    e.vy = Math.sin(angle) * e.speed;
    // flanker: reduce offset angle as it gets close
    if (e.type === 'flanker' && dist < 150) {
      e.offsetAngle *= 0.97;
    }
    e.x += e.vx;
    e.y += e.vy;
    if (e.deathFlash > 0) e.deathFlash--;
  }

  // ── Move bullets
  for (const b of bullets) {
    b.x += b.vx;
    b.y += b.vy;
    b.life--;
  }

  // ── Collisions: bullet → enemy
  for (let bi = bullets.length - 1; bi >= 0; bi--) {
    const b = bullets[bi];
    if (!b.fromPlayer) continue;
    for (let ei = enemies.length - 1; ei >= 0; ei--) {
      const e = enemies[ei];
      const dx = b.x - e.x;
      const dy = b.y - e.y;
      if (Math.sqrt(dx * dx + dy * dy) < e.size * 0.7) {
        e.hp--;
        e.deathFlash = 6;
        bullets.splice(bi, 1);
        if (e.hp <= 0) {
          score += e.score;
          addDeathRing(e.x, e.y, e.color);
          enemies.splice(ei, 1);
        }
        break;
      }
    }
  }

  // ── Collisions: enemy → player
  if (player.invincibleTimer === 0) {
    for (const e of enemies) {
      const dx = e.x - player.x;
      const dy = e.y - player.y;
      if (Math.sqrt(dx * dx + dy * dy) < e.size * 0.6 + player.radius * 0.6) {
        const dmg = e.type === 'tank' ? 20 : e.type === 'rusher' ? 15 : 10;
        player.hp -= dmg;
        player.invincibleTimer = 60;
        shakeTimer = 12;
        if (player.hp <= 0) {
          player.hp = 0;
          state = 'game-over';
          return;
        }
        break;
      }
    }
  }

  // Remove out-of-bounds bullets
  bullets = bullets.filter(b => b.life > 0 && b.x > -20 && b.x < W + 20 && b.y > -20 && b.y < H + 20);

  // ── Death rings
  for (const r of deathRings) {
    r.r += 1.5;
    r.life -= 0.05;
  }
  deathRings = deathRings.filter(r => r.life > 0);

  // ── Level complete
  if (enemies.length === 0 && spawnQueue.length === 0) {
    state = 'level-clear';
  }
}

// ── Draw helpers ───────────────────────────────────────────────────────────
function px(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.round(x), Math.round(y), w, h);
}

function drawPlayer() {
  ctx.save();
  ctx.translate(player.x, player.y);

  // Blink when invincible
  if (player.invincibleTimer > 0 && Math.floor(player.invincibleTimer / 5) % 2 === 0) {
    ctx.restore();
    return;
  }

  // Legs (walking animation)
  const legSwing = Math.sin(player.frameCount * 0.25) * 4;
  ctx.fillStyle = '#336655';
  ctx.fillRect(-5, 6 + legSwing, 5, 7);   // left leg
  ctx.fillRect(1, 6 - legSwing, 5, 7);    // right leg

  // Body
  ctx.fillStyle = '#228866';
  ctx.fillRect(-9, -8, 18, 16);

  // Head
  ctx.fillStyle = '#44aa88';
  ctx.fillRect(-6, -12, 12, 10);

  // Eyes
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(-4, -10, 3, 3);
  ctx.fillRect(1, -10, 3, 3);

  // Rotate gun arm toward mouse
  ctx.save();
  ctx.rotate(player.angle);
  // Arm
  ctx.fillStyle = '#336655';
  ctx.fillRect(0, -3, 14, 5);
  // Gun barrel
  ctx.fillStyle = '#aaaaaa';
  ctx.fillRect(8, -2, 8, 3);
  // Muzzle flash
  if (player.muzzleFlash > 0) {
    ctx.fillStyle = '#ffffaa';
    ctx.fillRect(16, -4, 8, 8);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(17, -2, 5, 4);
  }
  ctx.restore();

  ctx.restore();
}

function drawEnemy(e) {
  ctx.save();
  ctx.translate(e.x, e.y);

  const flash = e.deathFlash > 0;
  const c = flash ? '#ffffff' : e.color;
  const s = e.size;

  if (e.type === 'grunt') {
    // Blocky humanoid
    ctx.fillStyle = flash ? '#ffffff' : '#882222';
    ctx.fillRect(-s/2, s/3, s/3, s/2);  // left leg
    ctx.fillRect(s/6, s/3, s/3, s/2);   // right leg
    ctx.fillStyle = c;
    ctx.fillRect(-s/2, -s/4, s, s*0.6); // body
    ctx.fillStyle = flash ? '#ffffff' : '#aa3333';
    ctx.fillRect(-s/3, -s*0.75, s*0.66, s*0.55); // head
    ctx.fillStyle = flash ? '#ff0000' : '#ffcc00';
    ctx.fillRect(-s/4, -s*0.6, s/5, s/5); // left eye
    ctx.fillRect(s/12, -s*0.6, s/5, s/5); // right eye
  } else if (e.type === 'rusher') {
    // Spiked shape
    ctx.fillStyle = c;
    ctx.fillRect(-s/2, -s/4, s, s/2);
    // Spikes
    ctx.fillRect(-s*0.75, -s/6, s/4, s/3);
    ctx.fillRect(s/2, -s/6, s/4, s/3);
    ctx.fillRect(-s/4, -s*0.7, s/2, s/4);
    ctx.fillRect(-s/4, s/4+2, s/2, s/4);
    // Eye
    ctx.fillStyle = flash ? '#ff6600' : '#ffffff';
    ctx.fillRect(-s/6, -s/8, s/3, s/4);
  } else if (e.type === 'flanker') {
    // Diamond shape
    const bob = Math.sin(e.frameCount * 0.1) * 2;
    ctx.fillStyle = c;
    ctx.fillRect(-s/4, -s/2 + bob, s/2, s);
    ctx.fillRect(-s/2, -s/4 + bob, s, s/2);
    // Inner highlight
    ctx.fillStyle = flash ? '#ffffff' : '#cc66ff';
    ctx.fillRect(-s/6, -s/6 + bob, s/3, s/3);
    // Eyes
    ctx.fillStyle = flash ? '#cc00ff' : '#ffffff';
    ctx.fillRect(-s/5, -s/8 + bob, s/6, s/6);
    ctx.fillRect(s/12, -s/8 + bob, s/6, s/6);
  } else if (e.type === 'tank') {
    // Heavy square
    ctx.fillStyle = flash ? '#ffffff' : '#556677';
    ctx.fillRect(-s/2, -s/2, s, s);
    ctx.fillStyle = c;
    ctx.fillRect(-s/2+2, -s/2+2, s-4, s-4);
    // Armour plates
    ctx.fillStyle = flash ? '#aaaaaa' : '#889aaa';
    ctx.fillRect(-s/2, -s/2, s, 4);
    ctx.fillRect(-s/2, s/2-4, s, 4);
    ctx.fillRect(-s/2, -s/2, 4, s);
    ctx.fillRect(s/2-4, -s/2, 4, s);
    // Eyes / visor
    ctx.fillStyle = flash ? '#ff0000' : '#ff4444';
    ctx.fillRect(-s/4, -s/6, s/2, s/6);
    // Turret
    ctx.fillStyle = flash ? '#ffffff' : '#667788';
    ctx.fillRect(-s/6, -s/6, s/3, s/3);
    // Health bar for tank
    const hpPct = e.hp / e.maxHp;
    ctx.fillStyle = '#333';
    ctx.fillRect(-s/2, s/2+4, s, 5);
    ctx.fillStyle = hpPct > 0.5 ? '#44ff44' : '#ff4444';
    ctx.fillRect(-s/2, s/2+4, s * hpPct, 5);
  }

  ctx.restore();
}

function drawBullet(b) {
  ctx.fillStyle = '#ffff44';
  ctx.fillRect(b.x - 4, b.y - 2, 8, 4);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(b.x - 2, b.y - 1, 4, 2);
}

function drawHUD() {
  // HP bar background
  ctx.fillStyle = '#222';
  ctx.fillRect(10, 10, 154, 18);
  ctx.fillStyle = '#550000';
  ctx.fillRect(12, 12, 150, 14);
  // HP fill
  const hpPct = player.hp / player.maxHp;
  ctx.fillStyle = hpPct > 0.5 ? '#cc2222' : hpPct > 0.25 ? '#ff6600' : '#ff0000';
  ctx.fillRect(12, 12, 150 * hpPct, 14);
  // HP label
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 11px monospace';
  ctx.fillText(`HP: ${player.hp}`, 16, 23);

  // Score & level (top right)
  ctx.fillStyle = '#ffff44';
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'right';
  ctx.fillText(`SCORE: ${score}`, W - 10, 24);
  ctx.fillText(`LEVEL: ${currentLevel}`, W - 10, 42);
  ctx.textAlign = 'left';

  // Enemy count
  const remaining = enemies.length + spawnQueue.length;
  ctx.fillStyle = '#aaaaaa';
  ctx.font = '12px monospace';
  ctx.fillText(`ENEMIES: ${remaining}`, 10, 44);
}

function drawBackground() {
  ctx.fillStyle = '#0d0d0d';
  ctx.fillRect(0, 0, W, H);

  // Subtle grid
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 1;
  const gs = 40;
  for (let x = 0; x < W; x += gs) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += gs) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
}

function drawDeathRings() {
  for (const r of deathRings) {
    ctx.strokeStyle = r.color;
    ctx.globalAlpha = r.life;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(r.x, r.y, r.r, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

function drawOverlay(lines, subLines) {
  // Dark overlay
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, W, H);

  // Main text
  ctx.textAlign = 'center';
  let y = H / 2 - (lines.length * 40) / 2;
  for (const { text, color, size } of lines) {
    ctx.fillStyle = color || '#ffffff';
    ctx.font = `bold ${size || 48}px monospace`;
    // Pixel shadow
    ctx.fillStyle = '#000000';
    ctx.fillText(text, W / 2 + 3, y + 3);
    ctx.fillStyle = color || '#ffffff';
    ctx.fillText(text, W / 2, y);
    y += (size || 48) + 16;
  }
  // Sub text
  y += 10;
  for (const { text, color, size } of subLines) {
    ctx.fillStyle = color || '#aaaaaa';
    ctx.font = `${size || 20}px monospace`;
    ctx.fillText(text, W / 2, y);
    y += (size || 20) + 10;
  }
  ctx.textAlign = 'left';
}

function drawMenu() {
  ctx.fillStyle = '#0d0d0d';
  ctx.fillRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  // Title
  ctx.textAlign = 'center';

  // Glow effect
  ctx.shadowColor = '#ff4444';
  ctx.shadowBlur = 20;
  ctx.fillStyle = '#ff4444';
  ctx.font = 'bold 64px monospace';
  ctx.fillText('TOP-DOWN', W / 2, H / 2 - 100);
  ctx.fillText('SHOOTER', W / 2, H / 2 - 30);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#ffff44';
  ctx.shadowColor = '#ffff44';
  ctx.shadowBlur = 10;
  ctx.font = 'bold 22px monospace';
  ctx.fillText('[ CLICK TO START ]', W / 2, H / 2 + 50);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#888888';
  ctx.font = '15px monospace';
  ctx.fillText('ARROW KEYS / WASD = MOVE', W / 2, H / 2 + 100);
  ctx.fillText('MOUSE = AIM   CLICK = SHOOT', W / 2, H / 2 + 122);
  ctx.fillText('KILL ALL ENEMIES TO ADVANCE', W / 2, H / 2 + 150);

  ctx.fillStyle = '#444';
  ctx.font = '12px monospace';
  ctx.fillText('5 LEVELS  ·  4 ENEMY TYPES  ·  NO MERCY', W / 2, H - 20);
  ctx.textAlign = 'left';
}

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  ctx.save();

  // Screen shake
  if (shakeTimer > 0) {
    const sx = (Math.random() - 0.5) * shakeAmt;
    const sy = (Math.random() - 0.5) * shakeAmt;
    ctx.translate(sx, sy);
  }

  if (state === 'menu') {
    drawMenu();
  } else if (state === 'playing') {
    drawBackground();
    drawDeathRings();
    for (const b of bullets) drawBullet(b);
    for (const e of enemies) drawEnemy(e);
    drawPlayer();
    drawHUD();
  } else if (state === 'level-clear') {
    drawBackground();
    drawDeathRings();
    drawHUD();
    drawOverlay(
      [
        { text: `LEVEL ${currentLevel}`, color: '#ffff44', size: 52 },
        { text: 'CLEAR!', color: '#44ff44', size: 52 },
      ],
      [
        { text: `SCORE: ${score}`, color: '#ffffff', size: 24 },
        { text: currentLevel < 5 ? `[ CLICK FOR LEVEL ${currentLevel + 1} ]` : '[ CLICK FOR VICTORY SCREEN ]', color: '#aaaaaa', size: 18 },
      ]
    );
  } else if (state === 'game-over') {
    drawBackground();
    drawOverlay(
      [
        { text: 'GAME OVER', color: '#ff2222', size: 56 },
      ],
      [
        { text: `FINAL SCORE: ${score}`, color: '#ffff44', size: 26 },
        { text: `REACHED LEVEL ${currentLevel}`, color: '#ffffff', size: 20 },
        { text: '[ CLICK TO RETURN TO MENU ]', color: '#888888', size: 16 },
      ]
    );
  }

  ctx.restore();
}

// ── Game loop ──────────────────────────────────────────────────────────────
function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
