<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 24px;
    }

    h1 {
      font-size: 2.5rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      color: #a8dadc;
      min-height: 1.5em;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 12px;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      border-color: #e94560;
      animation: pulse 0.5s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    #scores {
      display: flex;
      gap: 32px;
      font-size: 1rem;
    }

    .score-box {
      text-align: center;
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 10px;
      padding: 10px 24px;
    }

    .score-box .label { color: #888; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; }
    .score-box .value { font-size: 1.8rem; font-weight: bold; }
    .score-box.x-score .value { color: #e94560; }
    .score-box.o-score .value { color: #a8dadc; }
    .score-box.draw-score .value { color: #aaa; }

    button {
      padding: 10px 28px;
      font-size: 1rem;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s;
    }

    button:hover { background: #c73652; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>

  <div id="scores">
    <div class="score-box x-score">
      <div class="label">X Wins</div>
      <div class="value" id="scoreX">0</div>
    </div>
    <div class="score-box draw-score">
      <div class="label">Draws</div>
      <div class="value" id="scoreDraw">0</div>
    </div>
    <div class="score-box o-score">
      <div class="label">O Wins</div>
      <div class="value" id="scoreO">0</div>
    </div>
  </div>

  <div id="status">X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <button onclick="resetBoard()">New Game</button>

  <script>
    const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    let board = Array(9).fill(null);
    let current = 'X';
    let gameOver = false;
    let scores = { X: 0, O: 0, Draw: 0 };

    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');

    cells.forEach(cell => cell.addEventListener('click', () => {
      const i = +cell.dataset.i;
      if (gameOver || board[i]) return;

      board[i] = current;
      cell.textContent = current;
      cell.classList.add(current.toLowerCase(), 'taken');

      const winLine = checkWin();
      if (winLine) {
        winLine.forEach(j => cells[j].classList.add('win'));
        status.textContent = `${current} wins!`;
        scores[current]++;
        updateScores();
        gameOver = true;
      } else if (board.every(Boolean)) {
        status.textContent = "It's a draw!";
        scores.Draw++;
        updateScores();
        gameOver = true;
      } else {
        current = current === 'X' ? 'O' : 'X';
        status.textContent = `${current}'s turn`;
      }
    }));

    function checkWin() {
      return WINS.find(([a, b, c]) => board[a] && board[a] === board[b] && board[a] === board[c]) || null;
    }

    function updateScores() {
      document.getElementById('scoreX').textContent = scores.X;
      document.getElementById('scoreO').textContent = scores.O;
      document.getElementById('scoreDraw').textContent = scores.Draw;
    }

    function resetBoard() {
      board = Array(9).fill(null);
      current = 'X';
      gameOver = false;
      status.textContent = "X's turn";
      cells.forEach(cell => {
        cell.textContent = '';
        cell.className = 'cell';
      });
    }
  </script>
</body>
</html>
