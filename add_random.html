<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Random Number Adder</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 40px;
      width: 360px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      text-align: center;
    }
    h1 { font-size: 1.4rem; margin-bottom: 24px; color: #222; }
    input {
      width: 100%;
      padding: 12px 16px;
      font-size: 1.1rem;
      border: 2px solid #ddd;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #4f46e5; }
    button {
      margin-top: 16px;
      width: 100%;
      padding: 12px;
      font-size: 1rem;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #4338ca; }
    button:disabled { background: #a5b4fc; cursor: not-allowed; }
    .result {
      margin-top: 28px;
      padding: 20px;
      background: #eef2ff;
      border-radius: 8px;
      color: #3730a3;
    }
    .result .equation { font-size: 1rem; margin-bottom: 8px; color: #555; }
    .result .answer { font-size: 2rem; font-weight: bold; }
    .error { margin-top: 12px; color: #dc2626; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    function App() {
      const [input, setInput] = React.useState('');
      const [result, setResult] = React.useState(null);
      const [error, setError] = React.useState('');
      const [loading, setLoading] = React.useState(false);

      async function calculate() {
        const num = Number(input);
        if (input.trim() === '' || isNaN(num)) {
          setError('Please enter a valid number.');
          setResult(null);
          return;
        }
        setError('');
        setLoading(true);
        try {
          const res = await fetch('http://localhost:5000/calculate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ number: num })
          });
          if (!res.ok) throw new Error('Server error');
          const data = await res.json();
          setResult(data);
        } catch (e) {
          setError('Could not reach the Python server. Is it running?');
        } finally {
          setLoading(false);
        }
      }

      function handleKey(e) {
        if (e.key === 'Enter') calculate();
      }

      return (
        <div className="card">
          <h1>Please enter a number</h1>
          <input
            type="number"
            placeholder="e.g. 42"
            value={input}
            onChange={e => setInput(e.target.value)}
            onKeyDown={handleKey}
            autoFocus
          />
          {error && <p className="error">{error}</p>}
          <button onClick={calculate} disabled={loading}>
            {loading ? 'Calculating…' : 'Calculate'}
          </button>
          {result && (
            <div className="result">
              <p className="equation">
                {result.input} + {result.random} (random 1–5000)
              </p>
              <p className="answer">= {result.result}</p>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
